<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>perfil</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: bisque;
      }
      h1,
      h2 {
        text-align: center;
      }
      div.minhaLista {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      div.foto-perfil {
        display: flex;
        justify-content: center;
        align-items: center;

        margin: 20px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      input[type='text'] {
        display: block;
        margin: 0 auto 10px auto;
        padding: 10px;
        font-size: 16px;
        width: 80%;
        max-width: 400px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        display: block;
        margin: 0 auto;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .concluida {
        text-decoration: line-through;
        color: gray;
      }
      li {
        margin: 10px 0;
        padding: 10px;
        background-color: #e0e0e0;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <h1>Arthur</h1>
    <div class="foto-perfil">
      <div class="foto">
        <img
          src="foto/Imagem do WhatsApp de 2025-05-24 à(s) 10.37.29_b22ddc88.jpg"
          alt="Foto de perfil"
          width="200"
          height="200"
        />
      </div>
    </div>
    <h2>Minha Lista de Tarefas</h2>
    <div class="minhaLista">
      <input type="text" id="tarefaInput" placeholder="Digite uma tarefa" />
      <button onclick="adicionarTarefa()">Adicionar Tarefa</button>
      <button onclick="concluida()">Tarefas Concluídas</button>
      <button onclick="pendentes()">Tarefas Pendentes</button>
      <button onclick="mostrarTodas()">Mostrar Todas</button>
      <p>Tarefas:</p>
      <p class="quantTarefas"></p>
      <ul id="listaTarefas"></ul>
    </div>
    <script>
      let tarefas = []

      function renderizarTarefas() {
        let listaTarefas = document.getElementById('listaTarefas')
        listaTarefas.innerHTML = ''
        tarefas.forEach(tarefa => {
          const novaTarefa = document.createElement('li')
          const btnRemover = document.createElement('button')
          btnRemover.textContent = 'Remover'
          const itemTarefa = document.createElement('span')
          itemTarefa.textContent = tarefa
          novaTarefa.appendChild(itemTarefa)
          novaTarefa.appendChild(btnRemover)
          listaTarefas.appendChild(novaTarefa)
        })
      }

      function adicionarTarefa() {
        function atualizarContador() {
          let contador = document.querySelectorAll('#listaTarefas li').length
          quantTarefas.textContent = `${contador}`
          // conta os li
          // atualiza o texto
        }

        let quantTarefas = document.querySelector('.quantTarefas')
        const tarefaInput = document.getElementById('tarefaInput')
        const tarefa = tarefaInput.value.trim()
        if (tarefa !== '') {
          const listaTarefas = document.getElementById('listaTarefas')
          const novaTarefa = document.createElement('li')
          const btnRemover = document.createElement('button')

          btnRemover.textContent = 'Remover'
          const itemTarefa = document.createElement('span')
          itemTarefa.textContent = tarefa
          novaTarefa.appendChild(itemTarefa)
          novaTarefa.appendChild(btnRemover)
          novaTarefa.addEventListener('click', () => {
            novaTarefa.classList.toggle('concluida')
          })

          btnRemover.addEventListener('click', () => {
            listaTarefas.removeChild(novaTarefa)
            atualizarContador()
          })
          let tarefaExistente = false
          for (const item of listaTarefas.children) {
            const tarefaItem = item.querySelector('span').textContent

            if (tarefaItem === tarefa) {
              tarefaExistente = true
              break
            }
          }
          if (tarefaExistente) {
            alert('Essa tarefa já existe na lista.')
          } else {
            listaTarefas.appendChild(novaTarefa)
          }
          tarefas.push(tarefa)

          tarefaInput.value = ''

          atualizarContador()
        }
      }
      function concluida() {
        const tarefas = document.querySelectorAll('#listaTarefas li')
        tarefas.forEach(tarefa => {
          if (tarefa.classList.toggle('concluida')) {
            tarefa.style.display = 'block'
          } else {
            tarefa.style.display = 'none'
          }
        })
      }
      function pendentes() {
        const tarefas = document.querySelectorAll('#listaTarefas li')
        tarefas.forEach(tarefa => {
          if (!tarefa.classList.contains('concluida')) {
            tarefa.style.display = 'block'
          } else {
            tarefa.style.display = 'none'
          }
        })
      }
      function mostrarTodas() {
        const tarefas = document.querySelectorAll('#listaTarefas li')
        tarefas.forEach(tarefa => {
          tarefa.style.display = 'block'
        })
      }
    </script>
  </body>
</html>
