<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>perfil</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: bisque;
      }
      h1,
      h2 {
        text-align: center;
      }
      div.minhaLista {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }
      div.foto-perfil {
        display: flex;
        justify-content: center;
        align-items: center;

        margin: 20px;
        padding: 10px;
        background-color: #f0f0f0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      input[type="text"] {
        display: block;
        margin: 0 auto 10px auto;
        padding: 10px;
        font-size: 16px;
        width: 80%;
        max-width: 400px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        display: block;
        margin: 0 auto;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Arthur</h1>
    <div class="foto-perfil">
      <div class="foto">
        <img
          src="foto/Imagem do WhatsApp de 2025-05-24 à(s) 10.37.29_b22ddc88.jpg"
          alt="Foto de perfil"
          width="200"
          height="200"
        />
      </div>
    </div>
    <h2>Minha Lista de Tarefas</h2>
    <div class="minhaLista">
        <input type="text" id="tarefaInput" placeholder="Digite uma tarefa">
        <button onclick="adicionarTarefa()">Adicionar Tarefa</button>
    </div>
    <script>
        function adicionarTarefa(){
            const tarefaInput = document.getElementById('tarefaInput');
            const tarefa = tarefaInput.value.trim();
            if(tarefa !== ''){
                const listaTarefas = document.querySelector('.minhaLista');
                const novaTarefa = document.createElement('ul');
                const itemTarefa = document.createElement('li');
                itemTarefa.ATTRIBUTE_NODE = document.createElement('button');
                btnRemover.textContent = 'Remover';
                itemTarefa.textContent = tarefa;
                novaTarefa.appendChild(itemTarefa);
                itemTarefa.appendChild(btnRemover);

                btnRemover.addEventListener('click', () => {
                    listaTarefas.removeChild(novaTarefa);
                });
                listaTarefas.appendChild(novaTarefa);
                tarefaInput.value = '';
            }
        }
    </script>
  </body>
</html>
